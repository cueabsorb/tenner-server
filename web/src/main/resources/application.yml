server:
  port: ${irallyin.vars.server.port}
  servlet:
    context-path: ${irallyin.vars.server.context-path}

spring:
  application:
    name: tennis-server-web

  # 默认 dev 环境
  profiles:
    active: ${IRALLYIN_PROFILE:dev}

  config:
    import:
      - optional:classpath:irallyin-variables.properties
      - optional:file:./irallyin-variables.yml
      - optional:file:../irallyin-variables.yml
      - optional:file:./irallyin-variables.properties
      - optional:file:../irallyin-variables.properties
      - optional:file:./irallyin-variables-local.yml
      - optional:file:../irallyin-variables-local.yml
      - optional:file:${user.home}/tennis-server/irallyin-variables.yml
      - optional:file:${user.home}/tennis-server/irallyin-variables.properties
      - optional:classpath:aliyun-irallyin-variables.properties

  # Jackson
  jackson:
    date-format: yyyy-MM-dd'T'HH:mm:ss'Z'
    time-zone: UTC
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

  # Flyway
  flyway:
    enabled: ${irallyin.vars.flyway.enabled:false}
    locations: classpath:db/migration
    baseline-on-migrate: true
    encoding: UTF-8

  # Servlet
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

# MyBatis-Plus
mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  global-config:
    db-config:
      id-type: assign_uuid
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

# SpringDoc OpenAPI
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

# Logging
logging:
  config: classpath:logback-spring.xml
  file:
    path: ${LOG_PATH:${irallyin.vars.logging.log-path:${catalina.base:..}/logs}}
  level:
    com.irallyin.server: ${irallyin.vars.logging.application-level}
    org.springframework.security: ${irallyin.vars.logging.security-level}

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
