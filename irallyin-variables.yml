# Centralized runtime variables for tenner-server.
# Datasource config moved to shardingsphere-dev.yaml / shardingsphere-prod.yaml
# Secrets are loaded from irallyin-variables-local.yml (not committed).

---
spring:
  config:
    activate:
      on-profile: dev

irallyin:
  vars:
    server:
      port: 8080
      context-path: /api
    mysql:
      url: jdbc:mysql://localhost:3306/ir_auth?useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC&allowPublicKeyRetrieval=true&useSSL=false
      username: root
      password: 12345678
    redis:
      host: localhost
      port: 6379
      password: ${irallyin.secrets.redis.password:}
      database: 0
      timeout: 5000ms
      max-active: 20
      max-idle: 10
      min-idle: 5
    mongodb:
      uri: ${irallyin.secrets.mongodb.uri:mongodb://localhost:27017/irallyin_activity}
    mail:
      smtp-host: smtp.qq.com
      smtp-port: 587
      username: irallyin@foxmail.com
      password: ${irallyin.secrets.mail.password:mypaeunchdwobceg}
      imap-host: imap.qq.com
      imap-port: 993
      imap-ssl: true
    jwt:
      secret: ${irallyin.secrets.jwt.secret:dev-secret-key-change-in-production-at-least-256-bits-long-for-hs256}
      access-token-expiration: 7200000
      # App 登录状态保留 7 天；未来调整到 30 天时改为 2592000000。
      refresh-token-expiration: 604800000
    google:
      oauth:
        client-id: ${irallyin.secrets.google.oauth.client-id:dev-google-client-id.apps.googleusercontent.com}
        client-secret: ${irallyin.secrets.google.oauth.client-secret:}
    oss:
      endpoint: https://oss-cn-shanghai.aliyuncs.com
      access-key-id: ${irallyin.secrets.oss.access-key-id:dev-access-key}
      access-key-secret: ${irallyin.secrets.oss.access-key-secret:dev-access-secret}
      bucket-name: irallyin-media-dev
      cdn-domain: https://cdn-dev.irallyin.com
    logging:
      application-level: DEBUG
      security-level: DEBUG
      mybatis-plus-level: DEBUG
      log-path: ../log
  signature:
    # 本地开发默认关闭请求签名校验，避免旧 App 包或调试请求缺少 X-Signature 头直接失败。
    # 生产环境仍保持开启；本地需要演练签名时可在 irallyin-variables-local.yml 覆盖为 true。
    enabled: false
    timestamp-tolerance-ms: 300000
    nonce-ttl-seconds: 360
    excluded-paths:
      - /actuator
      - /v3/api-docs
      - /swagger-ui
      - /swagger-ui.html
    apps:
      irallyin-ios-dev-v1:
        public-key: 

---
spring:
  config:
    activate:
      on-profile: prod

irallyin:
  vars:
    server:
      port: 8080
      context-path: /api
    mysql:
      url: ${MYSQL_URL:jdbc:mysql://localhost:3306/ir_auth?useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC&allowPublicKeyRetrieval=true&useSSL=false}
      username: ${MYSQL_USERNAME:root}
      password: ${MYSQL_PASSWORD}
    redis:
      host: ${REDIS_HOST}
      port: 6379
      password: ${REDIS_PASSWORD}
      database: 0
      timeout: 3000ms
      max-active: 100
      max-idle: 30
      min-idle: 10
    mongodb:
      uri: ${MONGODB_URI}
    mail:
      smtp-host: ${MAIL_SMTP_HOST:smtp.qq.com}
      smtp-port: ${MAIL_SMTP_PORT:587}
      username: ${MAIL_USERNAME:irallyin@foxmail.com}
      password: ${MAIL_PASSWORD:mypaeunchdwobceg}
      imap-host: ${MAIL_IMAP_HOST:imap.qq.com}
      imap-port: ${MAIL_IMAP_PORT:993}
      imap-ssl: true
    jwt:
      secret: ${JWT_SECRET}
      access-token-expiration: 7200000
      # App 登录状态保留 7 天；未来调整到 30 天时改为 2592000000。
      refresh-token-expiration: 604800000
    google:
      oauth:
        client-id: ${GOOGLE_OAUTH_CLIENT_ID}
        client-secret: ${GOOGLE_OAUTH_CLIENT_SECRET:}
    oss:
      endpoint: https://oss-cn-shanghai.aliyuncs.com
      access-key-id: ${OSS_ACCESS_KEY_ID}
      access-key-secret: ${OSS_ACCESS_KEY_SECRET}
      bucket-name: irallyin-media
      cdn-domain: https://cdn.irallyin.com
    logging:
      application-level: INFO
      security-level: WARN
      mybatis-plus-level: DEBUG
      log-path: /var/log/irallyin
  signature:
    enabled: true
    timestamp-tolerance-ms: 300000
    nonce-ttl-seconds: 360
    excluded-paths:
      - /actuator
      - /v3/api-docs
      - /swagger-ui
      - /swagger-ui.html
    apps:
      irallyin-ios-dev-v1:
        public-key: ${IRALLYIN_IOS_PUBLIC_KEY}
