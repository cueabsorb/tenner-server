# Project-root irallyin-variables.properties for SMTP/Redis configuration
# NOTE: This file is intentionally placed at project root as requested. For production, consider
# storing secrets in environment variables or a secrets manager instead of this file.

smtp.host=smtp.qq.com
smtp.port=465
smtp.username=irallyin@foxmail.com
smtp.password=mypaeunchdwobceg
smtp.from=irallyin@foxmail.com
smtp.auth=true
smtp.ssl=true
smtp.debug=true

# Optional: where to send test emails in integration test (if provided)
smtp.test.to=tianfengzhang1984@gmail.com

# Redis connection (optional) - used by RedisVerificationCodeStore
redis.host=127.0.0.1
redis.port=6379
redis.password=


# ---- values migrated from irallyin-variables.yml (dev profile) ----
# irallyin.vars.* namespace mirrors the YAML structure
irallyin.vars.server.port=8080
irallyin.vars.server.context-path=/api

irallyin.vars.mysql.url=jdbc:mysql://localhost:3306/ir_auth?useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC&allowPublicKeyRetrieval=true&useSSL=false
irallyin.vars.mysql.username=root
irallyin.vars.mysql.password=12345678

irallyin.vars.redis.host=localhost
irallyin.vars.redis.port=6379
irallyin.vars.redis.password=${irallyin.secrets.redis.password:}
irallyin.vars.redis.database=0
irallyin.vars.redis.timeout=5000ms
irallyin.vars.redis.max-active=20
irallyin.vars.redis.max-idle=10
irallyin.vars.redis.min-idle=5

irallyin.vars.mongodb.uri=${irallyin.secrets.mongodb.uri:mongodb://localhost:27017/irallyin_activity}

irallyin.vars.mail.smtp-host=smtp.qq.com
irallyin.vars.mail.smtp-port=587
irallyin.vars.mail.username=irallyin@foxmail.com
irallyin.vars.mail.password=mypaeunchdwobceg
irallyin.vars.mail.imap-host=imap.qq.com
irallyin.vars.mail.imap-port=993
irallyin.vars.mail.imap-ssl=true

irallyin.vars.jwt.secret=${irallyin.secrets.jwt.secret:dev-secret-key-change-in-production-at-least-256-bits-long-for-hs256}
irallyin.vars.jwt.access-token-expiration=7200000
# App 登录状态保留 7 天；未来调整到 30 天时改为 2592000000。
irallyin.vars.jwt.refresh-token-expiration=604800000

irallyin.vars.google.oauth.client-id=${irallyin.secrets.google.oauth.client-id:dev-google-client-id.apps.googleusercontent.com}
irallyin.vars.google.oauth.client-secret=${irallyin.secrets.google.oauth.client-secret:}

irallyin.vars.oss.endpoint=https://oss-cn-shanghai.aliyuncs.com
irallyin.vars.oss.access-key-id=${irallyin.secrets.oss.access-key-id:dev-access-key}
irallyin.vars.oss.access-key-secret=${irallyin.secrets.oss.access-key-secret:dev-access-secret}
irallyin.vars.oss.bucket-name=irallyin-media-dev
irallyin.vars.oss.cdn-domain=https://cdn-dev.irallyin.com

irallyin.vars.logging.application-level=DEBUG
irallyin.vars.logging.security-level=DEBUG
irallyin.vars.logging.mybatis-plus-level=DEBUG
irallyin.vars.logging.log-path=../log

# Flyway 仅初始化/迁移数据库时临时开启，服务正常运行默认关闭。
irallyin.vars.flyway.enabled=false

# ---- values migrated from irallyin-variables.yml (prod profile) ----
irallyin.vars.server.port.prod=8080
irallyin.vars.server.context-path.prod=/api

irallyin.vars.redis.host.prod=${REDIS_HOST}
irallyin.vars.redis.port.prod=6379
irallyin.vars.redis.password.prod=${REDIS_PASSWORD}
irallyin.vars.redis.database.prod=0
irallyin.vars.redis.timeout.prod=3000ms
irallyin.vars.redis.max-active.prod=100
irallyin.vars.redis.max-idle.prod=30
irallyin.vars.redis.min-idle.prod=10

irallyin.vars.mongodb.uri.prod=${MONGODB_URI}

irallyin.vars.mail.smtp-host.prod=${MAIL_SMTP_HOST:smtp.qq.com}
irallyin.vars.mail.smtp-port.prod=${MAIL_SMTP_PORT:587}
irallyin.vars.mail.username.prod=${MAIL_USERNAME:irallyin@foxmail.com}
irallyin.vars.mail.password.prod=${MAIL_PASSWORD:mypaeunchdwobceg}
irallyin.vars.mail.imap-host.prod=${MAIL_IMAP_HOST:imap.qq.com}
irallyin.vars.mail.imap-port.prod=${MAIL_IMAP_PORT:993}
irallyin.vars.mail.imap-ssl.prod=true

irallyin.vars.jwt.secret.prod=${JWT_SECRET}
irallyin.vars.jwt.access-token-expiration.prod=7200000
# App 登录状态保留 7 天；未来调整到 30 天时改为 2592000000。
irallyin.vars.jwt.refresh-token-expiration.prod=604800000

irallyin.vars.google.oauth.client-id.prod=${GOOGLE_OAUTH_CLIENT_ID}
irallyin.vars.google.oauth.client-secret.prod=${GOOGLE_OAUTH_CLIENT_SECRET:}

irallyin.vars.oss.endpoint.prod=https://oss-cn-shanghai.aliyuncs.com
irallyin.vars.oss.access-key-id.prod=${OSS_ACCESS_KEY_ID}
irallyin.vars.oss.access-key-secret.prod=${OSS_ACCESS_KEY_SECRET}
irallyin.vars.oss.bucket-name.prod=irallyin-media
irallyin.vars.oss.cdn-domain.prod=https://cdn.irallyin.com

irallyin.vars.logging.application-level.prod=INFO
irallyin.vars.logging.security-level.prod=WARN
irallyin.vars.logging.mybatis-plus-level.prod=DEBUG
irallyin.vars.logging.log-path.prod=/var/log/irallyin

# Request signature verification
irallyin.signature.enabled=false
irallyin.signature.timestamp-tolerance-ms=300000
irallyin.signature.nonce-ttl-seconds=360
irallyin.signature.excluded-paths[0]=/actuator
irallyin.signature.excluded-paths[1]=/v3/api-docs
irallyin.signature.excluded-paths[2]=/swagger-ui
irallyin.signature.excluded-paths[3]=/swagger-ui.html
irallyin.signature.apps.irallyin-ios-dev-v1.public-
